name: CI/CD Docker Images

on:
  push:
    branches: [master]
  release:
    types: [published]

jobs:

  validate-readme-versions:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate README supported versions
        run: |
          python3 .github/scripts/validate_readme_versions.py versions.json README.md

  resolve-matrix:
    runs-on: ubuntu-latest
    outputs:
      python_versions: ${{ steps.versions.outputs.python_versions }}
      texlive_versions: ${{ steps.versions.outputs.texlive_versions }}
      latest_python_version: ${{ steps.versions.outputs.latest_python_version }}
      latest_texlive_version: ${{ steps.versions.outputs.latest_texlive_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version matrix
        id: versions
        run: |
          python3 .github/scripts/resolve_versions.py versions.json

  build-and-push:
    needs:
      - validate-readme-versions
      - resolve-matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python_version: ${{ fromJSON(needs.resolve-matrix.outputs.python_versions) }}
        texlive_version: ${{ fromJSON(needs.resolve-matrix.outputs.texlive_versions) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute Docker tags
        id: tags
        run: |
          TAG="${{ matrix.python_version }}_${{ matrix.texlive_version }}"
          FULL="jeesoo9595/mcpl-paper:${TAG}"
          echo "tags=${FULL}" >> "$GITHUB_OUTPUT"

      - name: Log in to DockerHub
        if: github.event_name == 'release'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name == 'release' }}
          tags: ${{ steps.tags.outputs.tags }}
          build-args: |
            PYTHON_VERSION=${{ matrix.python_version }}
            TEXLIVE_VERSION=${{ matrix.texlive_version }}
          cache-from: type=gha,scope=py${{ matrix.python_version }}-tl${{ matrix.texlive_version }}
          cache-to: type=gha,mode=max,scope=py${{ matrix.python_version }}-tl${{ matrix.texlive_version }}
