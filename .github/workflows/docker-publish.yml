name: CI/CD Docker Images

on:
  push:
    branches: [master]
    tags: ['[0-9][0-9].[0-9][0-9].[0-9][0-9]*']

jobs:

  validate-readme-versions:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate README supported versions
        run: |
          python3 .github/scripts/validate_readme_versions.py versions.json README.md

  resolve-matrix:
    runs-on: ubuntu-latest
    outputs:
      python_versions: ${{ steps.versions.outputs.python_versions }}
      texlive_versions: ${{ steps.versions.outputs.texlive_versions }}
      latest_python_version: ${{ steps.versions.outputs.latest_python_version }}
      latest_texlive_version: ${{ steps.versions.outputs.latest_texlive_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version matrix
        id: versions
        run: |
          python3 .github/scripts/resolve_versions.py versions.json

  build-and-push:
    needs:
      - validate-readme-versions
      - resolve-matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python_version: ${{ fromJSON(needs.resolve-matrix.outputs.python_versions) }}
        texlive_version: ${{ fromJSON(needs.resolve-matrix.outputs.texlive_versions) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute Docker tags
        id: tags
        run: |
          BASE_TAG="${{ matrix.python_version }}_${{ matrix.texlive_version }}"
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            CALVER="${{ github.ref_name }}"
            FULL="jeesoo9595/mcpl-paper:${BASE_TAG}-${CALVER}"
          else
            FULL="jeesoo9595/mcpl-paper:${BASE_TAG}"
          fi
          echo "tags=${FULL}" >> "$GITHUB_OUTPUT"

      - name: Log in to DockerHub
        if: startsWith(github.ref, 'refs/tags/')
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        run: |
          MIRRORS=(
            "https://ftp.math.utah.edu/pub/tex/historic/"
            "https://texlive.info/historic/"
            "https://ftp.tu-chemnitz.de/pub/tug/historic/"
            "https://pi.kwarc.info/historic/"
            "https://mirrors.tuna.tsinghua.edu.cn/tex-historic-archive/"
            "https://mirror.nju.edu.cn/tex-historic/"
          )

          PUSH_FLAG=""
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            PUSH_FLAG="--push"
          fi

          CACHE_SCOPE="py${{ matrix.python_version }}-tl${{ matrix.texlive_version }}"

          for MIRROR in "${MIRRORS[@]}"; do
            echo "::group::Trying mirror: $MIRROR"
            if docker buildx build \
              --platform linux/amd64,linux/arm64 \
              $PUSH_FLAG \
              -t "${{ steps.tags.outputs.tags }}" \
              --build-arg "PYTHON_VERSION=${{ matrix.python_version }}" \
              --build-arg "TEXLIVE_VERSION=${{ matrix.texlive_version }}" \
              --build-arg "TEX_ARCHIVE=$MIRROR" \
              --cache-from "type=gha,scope=${CACHE_SCOPE}" \
              --cache-to "type=gha,mode=max,scope=${CACHE_SCOPE}" \
              .; then
              echo "::endgroup::"
              echo "Build succeeded with mirror: $MIRROR"
              exit 0
            fi
            echo "::endgroup::"
            echo "::warning::Build failed with mirror: $MIRROR"
          done

          echo "::error::All TeX Live mirrors failed!"
          exit 1
